<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 500; }
      .ts { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; font-size: 12px; font-weight: 400; }
    </style>
  </defs>

  <rect x="220" y="30" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="340" y="50" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Request enters probation</text>
  <text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Decode step counter starts at 0</text>

  <line x1="340" y1="86" x2="340" y2="120" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="200" y="120" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Each decode step</text>
  <text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Record token count, P(EOS), step idx</text>

  <text class="ts" x="115" y="210" text-anchor="middle" fill="#5F5E5A">EOS emitted</text>
  <text class="ts" x="340" y="210" text-anchor="middle" fill="#5F5E5A">step &lt; N (window)</text>
  <text class="ts" x="565" y="210" text-anchor="middle" fill="#5F5E5A">step == N (decision)</text>

  <path d="M260 176 L260 195 L115 195 L115 240" stroke="#27500A" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
  <path d="M340 176 L340 240" stroke="#534AB7" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
  <path d="M420 176 L420 195 L565 195 L565 240" stroke="#993C1D" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>

  <rect x="40" y="240" width="160" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="t" x="120" y="262" text-anchor="middle" dominant-baseline="central" fill="#27500A">Case A: completed</text>
  <text class="ts" x="120" y="282" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Return result, free KV</text>

  <rect x="260" y="240" width="160" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="340" y="262" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Continue decoding</text>
  <text class="ts" x="340" y="282" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Loop back to monitor</text>

  <path d="M340 300 Q280 320 280 150 Q280 130 340 130" stroke="#534AB7" stroke-width="0.6" fill="none" stroke-dasharray="3 3"/>

  <rect x="480" y="240" width="160" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="t" x="560" y="262" text-anchor="middle" dominant-baseline="central" fill="#633806">Apply decision rule</text>
  <text class="ts" x="560" y="282" text-anchor="middle" dominant-baseline="central" fill="#854F0B">See criteria below</text>

  <line x1="560" y1="300" x2="560" y2="340" stroke="#854F0B" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="340" y="340" width="300" height="120" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="490" y="362" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Decision rule at step N</text>
  <text class="ts" x="490" y="386" text-anchor="middle" dominant-baseline="central" fill="#444441">If tokens &lt; threshold OR max(P_EOS) &gt; eos_thresh:</text>
  <text class="ts" x="490" y="402" text-anchor="middle" dominant-baseline="central" fill="#444441">→ confirmed short, stay in probation</text>
  <text class="ts" x="490" y="424" text-anchor="middle" dominant-baseline="central" fill="#444441">Else (high token count AND low P_EOS):</text>
  <text class="ts" x="490" y="440" text-anchor="middle" dominant-baseline="central" fill="#444441">→ looks long, demote to long queue</text>

  <line x1="380" y1="460" x2="270" y2="490" stroke="#1D9E75" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
  <line x1="600" y1="460" x2="560" y2="490" stroke="#D85A30" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>

  <rect x="105" y="490" width="320" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="265" y="512" text-anchor="middle" dominant-baseline="central" fill="#085041">Case B: confirmed short</text>
  <text class="ts" x="265" y="532" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Stay in probation, finish at high priority</text>

  <rect x="445" y="490" width="200" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="t" x="545" y="512" text-anchor="middle" dominant-baseline="central" fill="#712B13">Case C: demoted</text>
  <text class="ts" x="545" y="532" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Move to long queue, KV kept</text>

  <text class="ts" x="340" y="595" text-anchor="middle" fill="#5F5E5A">Tunable parameters: N (window size), short_threshold, eos_thresh, long_quota</text>
</svg>
